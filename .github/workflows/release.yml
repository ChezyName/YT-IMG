name: Package and Release Extension

on:
  push:
    tags:
      - 'v*' # When git push tag with vXYZ such as v1.2.3

jobs:
  build-and-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Get Tag Version
        id: pre_step
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Processing version: $VERSION"

      - name: Update manifest.json Version
        uses: jossef/action-set-json-field@v2.2
        with:
          file: manifest.json
          field: version
          value: ${{ env.VERSION }}

      - name: Commit and Push manifest.json Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
            
          git add manifest.json
          if git diff --cached --quiet; then
            echo "Working tree clean. manifest.json is already up to date. Skipping commit."
          else
          git commit -m "Released ${{ env.VERSION }} [skip ci]"
          git push origin HEAD:${{ github.event.repository.default_branch }}
          fi

      - name: Create Release Zip Archive
        run: |
          zip -r YT-IMG-${{ github.ref_name }}.zip . -x "*.git*" "*.github*" "README.md"

      - name: Generate Automatic Release Notes and Release
        uses: softprops/action-gh-release@v2
        with:
          files: YT-IMG-${{ github.ref_name }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}