<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg-color: #212121;
      --text-color: #ffffff;
      --sub-text: #aaaaaa;
      --border-color: #333333;
      --hover-bg: rgba(255, 255, 255, 0.08);
      --active-bg: #3f3f3f;
      --card-bg: #1a1a1a;
      --body-bg: #0f0f0f;
    }

    @media (prefers-color-scheme: light) {
      :root.light-theme {
        --bg-color: #ffffff;
        --text-color: #030303;
        --sub-text: #606060;
        --border-color: #e5e5e5;
        --hover-bg: rgba(0, 0, 0, 0.05);
        --active-bg: #e0e0e0;
        --card-bg: #fcfcfc;
        --body-bg: #f9f9f9;
      }
    }

    html,
    body {
      background: var(--body-bg);
      margin: 0;
      padding: 0;
      width: 340px;
      height: 480px;
      box-sizing: border-box;
      color: var(--text-color);
      font-family: Roboto, Arial, sans-serif;
      overflow: hidden;
    }

    .popup-container {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      padding: 16px;
      background-color: var(--bg-color);
    }

    .view-pane {
      display: none;
      flex-direction: column;
      height: 100%;
      width: 100%;
    }

    .view-pane.active {
      display: flex;
    }

    h2 {
      font-size: 16px;
      font-weight: bolder;
      margin: 0 0 12px 0;
      text-align: center;
      color: var(--text-color);
    }

    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border-color);
    }

    .setting-label {
      font-size: 13px;
      font-weight: 500;
    }

    .stepper-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stepper-btn {
      background: var(--card-bg);
      color: var(--text-color);
      border: 1px solid var(--border-color);
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    .stepper-btn:hover {
      background: var(--hover-bg);
    }

    .stepper-value {
      font-size: 14px;
      font-weight: bold;
      min-width: 20px;
      text-align: center;
    }

    .filter-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      padding-bottom: 10px;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--border-color);
    }

    .tab-btn {
      background: var(--card-bg);
      color: var(--sub-text);
      border: 1px solid var(--border-color);
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 500;
      border-radius: 16px;
      cursor: pointer;
      transition: background-color 0.15s, color 0.15s;
    }

    .tab-btn:hover {
      background: var(--hover-bg);
    }

    .tab-btn.active {
      background: var(--active-bg);
      color: var(--text-color);
    }

    .gallery-viewport {
      flex: 1;
      overflow-y: auto;
      padding-right: 2px;
      margin-bottom: 12px;
    }

    .image-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      width: 100%;
    }

    .image-card {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background-color: var(--card-bg);
      box-sizing: border-box;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .image-card div,
    .image-card img {
      width: 100% !important;
      height: 100% !important;
      max-width: 100% !important;
      max-height: 100% !important;
      object-fit: cover !important;
      object-position: center !important;
      margin: 0 !important;
    }

    /* System Action Buttons */
    .action-btn {
      background: var(--card-bg);
      color: var(--text-color);
      border: 1px solid var(--border-color);
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 500;
      border-radius: 6px;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s;
    }

    .action-btn:hover {
      background: var(--hover-bg);
    }

    .footer {
      display: flex;
      justify-content: center;
      gap: 6px;
      font-size: 11px;
      color: var(--sub-text);
      padding-top: 8px;
      border-top: 1px solid var(--border-color);
    }

    .footer a {
      color: var(--sub-text);
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div class="popup-container view-pane active" id="settings">
    <h2>Settings</h2>

    <div class="setting-row">
      <span class="setting-label">Max Images Per Comment</span>
      <div class="stepper-container">
        <button type="button" class="stepper-btn" id="btn-dec">-</button>
        <span class="stepper-value" id="stepper-val">1</span>
        <button type="button" class="stepper-btn" id="btn-inc">+</button>
      </div>
    </div>

    <div style="display: flex; flex-direction: column; gap: 8px; margin-top: auto; margin-bottom: 8px;">
      <button type="button" class="action-btn" id="nav-to-gallery">View Images</button>
    </div>

    <div class="footer">
      <span>[</span><a href="https://github.com/ChezyName/YT-IMG" class="ext-link">GitHub</a><span>|</span><a href="https://www.youtube.com/@chezyname" class="ext-link">YouTube</a><span>]</span>
    </div>
  </div>

  <div class="popup-container view-pane" id="images">
    <h2>Images</h2>

    <div class="filter-row">
      <button type="button" class="tab-btn active" id="tab-all">All</button>
      <button type="button" class="tab-btn" id="tab-saved">Saved</button>
      <button type="button" class="tab-btn" id="tab-favorites">Favorites</button>
    </div>

    <div class="gallery-viewport">
      <div class="image-grid" id="images-row"></div>
    </div>

    <button type="button" class="action-btn" id="nav-to-settings" style="margin-bottom: 8px;">Back to Settings</button>

    <div class="footer">
      <span>[</span><a href="https://github.com/ChezyName/YT-IMG" class="ext-link">GitHub</a><span>|</span><a href="https://www.youtube.com/@chezyname" class="ext-link">YouTube</a><span>]</span>
    </div>
  </div>

  <script src="logger.js"></script>
  <script src="settings.js"></script>
  <script src="image.js"></script>
  <script src="popup.js"></script>
</body>

</html>
